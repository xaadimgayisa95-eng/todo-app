<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>البحث عن معلم</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#eef7f5;
padding:20px;
}

.container{

max-width:700px;
margin:auto;

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.1);

}

h1{

text-align:center;

color:#0b7a6d;

margin-bottom:25px;

}

input,select{

width:100%;

padding:14px;

margin-top:12px;

border-radius:12px;

border:2px solid #0b7a6d;

font-size:16px;

}

button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:12px;

background:#0b7a6d;

color:white;

font-size:18px;

cursor:pointer;

}

.card{

margin-top:25px;

padding:18px;

border-radius:15px;

background:#f7f7f7;

display:none;

}

.card h2{

color:#0b7a6d;

margin-bottom:10px;

}

.card p{

margin:8px 0;

}

</style>

</head>

<body>

<div class="container">

<h1>🎓 البحث عن معلم قرآن</h1>

<input id="country" placeholder="الدولة">

<input id="city" placeholder="المدينة">

<select id="gender">

<option>أي جنس</option>

<option>ذكر</option>

<option>أنثى</option>

</select>

<select id="method">

<option>أي طريقة</option>

<option>حضوري</option>

<option>عن بعد</option>

<option>حضوري وعن بعد</option>

</select>

<button onclick="searchTeacher()">

بحث

</button>

<div class="card" id="result">

<h2>عبدالله محمد</h2>

<p>📍 السنغال - داكار</p>

<p>📖 تحفيظ وتجويد</p>

<p>📱 واتساب: +221700000000</p>

</div>

</div>

<script>

function searchTeacher(){

document.getElementById("result").style.display="block";

}

</script>

</body>

</html>
