<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البحث عن معلم - Sunu Daara</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

header h1{
color:#0B7A6D;
}

.search{
background:white;
padding:15px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

.search input{
width:100%;
padding:15px;
border:none;
outline:none;
font-size:18px;
}

.filters{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:25px;
}

select{
padding:14px;
border-radius:14px;
border:none;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card{
background:white;
border-radius:20px;
padding:18px;
display:flex;
gap:15px;
align-items:center;
margin-bottom:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card img{
width:75px;
height:75px;
border-radius:50%;
object-fit:cover;
}

.info{
flex:1;
}

.info h2{
font-size:20px;
margin-bottom:6px;
}

.info p{
color:#666;
margin:4px 0;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>Sunu Daara</h1>

🔍

</header>

<div class="search">

<input placeholder="ابحث عن معلم...">

</div>

<div class="filters">

<select>

<option>كل الدول</option>

<option>السنغال</option>

<option>غينيا</option>

<option>مالي</option>

</select>

<select>

<option>كل طرق التدريس</option>

<option>حضوري</option>

<option>عن بعد</option>

</select>

</div>

<div class="card">

<img src="https://i.pravatar.cc/200?img=12">

<div class="info">

<h2>عبدالله محمد</h2>

<p>📍 دكار</p>

<p>⭐ 4.9</p>

<p>📖 تحفيظ • تجويد</p>

</div>

<button>

واتساب

</button>

</div>

<div class="card">

<img src="https://i.pravatar.cc/200?img=15">

<div class="info">

<h2>محمد الأمين</h2>

<p>📍 تييس</p>

<p>⭐ 5.0</p>

<p>📖 تحفيظ للأطفال</p>

</div>

<button>

واتساب

</button>

</div>

</body>
</html>
