<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل معلم</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#eef8f8;
}

.container{
max-width:500px;
margin:30px auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
color:#0d7b73;
text-align:center;
}

input,select,textarea{
width:100%;
padding:14px;
margin:10px 0;
border:2px solid #0d7b73;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#0d7b73;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#095f59;
}
</style>

</head>

<body>

<div class="container">

<h1>📖 تسجيل معلم</h1>

<input type="text" placeholder="الاسم الكامل">

<input type="text" placeholder="الدولة">

<input type="text" placeholder="المدينة">

<select>
<option>طريقة التدريس</option>
<option>حضوري</option>
<option>عن بعد</option>
<option>الاثنان</option>
</select>

<textarea placeholder="نبذة عنك"></textarea>

<button onclick="saveTeacher()">
حفظ البيانات
</button>

</div>

<script>

function saveTeacher(){

alert("سيتم حفظ البيانات في قاعدة البيانات لاحقًا.");

}

</script>

</body>
</html>
