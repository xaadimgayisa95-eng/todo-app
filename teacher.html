<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أنا معلم</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#eef7f5;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0b7a6d;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:14px;
margin-top:12px;
border:2px solid #0b7a6d;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:20px;
background:#0b7a6d;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#095f55;
}

.success{
display:none;
margin-top:20px;
padding:15px;
background:#d7fff1;
color:#006b50;
border-radius:10px;
text-align:center;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>🧑‍🏫 تسجيل معلم قرآن</h1>

<input id="name" placeholder="الاسم الكامل">

<input id="country" placeholder="الدولة">

<input id="city" placeholder="المدينة">

<input id="phone" placeholder="رقم واتساب">

<select id="gender">
<option>ذكر</option>
<option>أنثى</option>
</select>

<select id="method">
<option>حضوري</option>
<option>عن بعد</option>
<option>حضوري وعن بعد</option>
</select>

<textarea id="about" rows="5" placeholder="نبذة عنك"></textarea>

<button onclick="saveTeacher()">
تسجيل المعلم
</button>

<div class="success" id="msg">
✅ تم تسجيل البيانات (تجريبياً)
</div>

</div>

<script>

function saveTeacher(){

document.getElementById("msg").style.display="block";

}

</script>

</body>
</html>
